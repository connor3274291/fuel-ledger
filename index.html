<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --ink:#0E1116; --panel:#171C24; --panel-2:#1E2530; --line:#2A3240;
    --fog:#8B95A5; --fog-dim:#5C6675; --paper:#EDF0F4;
    --signal:#48C7FF; --signal-dim:#1F4A5C; --ember:#FF8A4C; --mint:#5FE3A6;
    --violet:#B18BFF; --danger:#FF6B6B; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--ink);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:0 0 100px;min-height:100vh;}
  .topbar{padding:22px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,17,22,0.92);backdrop-filter:blur(8px);z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--signal),var(--mint));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:15px;}
  .brand-name{font-weight:700;font-size:17px;}
  .brand-sub{font-size:10.5px;color:var(--fog-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
  .date-pill{font-size:12px;color:var(--fog);background:var(--panel);border:1px solid var(--line);padding:6px 10px;border-radius:20px;}
  .nav{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto;}
  .nav button{background:transparent;border:1px solid var(--line);color:var(--fog);padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .nav button.active{background:var(--paper);color:var(--ink);border-color:var(--paper);}
  .view{padding:16px 18px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-title{font-weight:700;font-size:15px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
  .card-title .tag{font-size:10.5px;color:var(--fog-dim);font-weight:400;}
  textarea,input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--paper);border-radius:10px;padding:11px 12px;font-size:14px;outline:none;}
  label{font-size:11.5px;color:var(--fog);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:6px;font-weight:600;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .btn{font-weight:700;font-size:14px;background:var(--signal);color:var(--ink);border:none;border-radius:10px;padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .btn.full{width:100%;}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .entry-name{font-size:13.5px;font-weight:600;}
  .entry-meta{font-size:11px;color:var(--fog);margin-top:2px;}
  .entry-cals{font-size:13px;color:var(--signal);font-weight:700;}
  .del-btn{background:none;border:none;color:var(--fog-dim);cursor:pointer;font-size:15px;padding:0 0 0 10px;}
  .del-btn:hover{color:var(--danger);}
  .ring-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;}
  .ring-card{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;width:104px;text-align:center;}
  .ring{width:64px;height:64px;border-radius:50%;margin:0 auto 8px;position:relative;display:flex;align-items:center;justify-content:center;}
  .ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring-color) calc(var(--pct)*1%), var(--panel-2) 0);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));}
  .ring-val{font-size:12px;font-weight:700;position:relative;z-index:2;}
  .ring-label{font-size:10.5px;color:var(--fog);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .ring-sub{font-size:10px;color:var(--fog-dim);margin-top:1px;}
  .search-results{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;margin-top:8px;max-height:280px;overflow-y:auto; position: absolute; width: 100%; z-index: 50; box-shadow: 0 10px 25px rgba(0,0,0,0.5);}
  .search-item{padding:12px;border-bottom:1px solid var(--line);cursor:pointer;}
  .search-item:hover{background:var(--line);}
  .chart-container{height:220px;margin-top:20px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--paper);color:var(--ink);padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
  .toast.show{opacity:1;}
  .micro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
  .micro-item{background:var(--panel-2);border-radius:10px;padding:10px 12px;}
  .micro-bar{height:5px;background:var(--line);border-radius:3px;margin:6px 0 4px;overflow:hidden;}
  .micro-fill{height:100%;background:var(--violet);border-radius:3px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://ylpjxopozaoukscimcuu.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscGp4b3BvemFvdWtzY2ltY3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDgwNDIsImV4cCI6MjA5OTAyNDA0Mn0.zMjLvvRBKnzfGlM3X1AyW5Xde4ifCo5_OveadamM82o";
const USDA_API_KEY = "lBJIhFX7M3zueedQ3bcY8mvZJOZNAaehdoARXPcf";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  screen: 'loading',
  session: null,
  profile: null,
  goals: null,
  tab: 'log',
  today: new Date().toISOString().slice(0,10),
  log: { foods:[], water_entries:[], water_oz:0 },
  savedRecipes: [],
  weightHistory: [],
  recipeDraft: { name:'', ingredients:[] }
};

// --- Core Utils ---
const el = (h) => { const d=document.createElement('div'); d.innerHTML=h; return d.firstElementChild; };
const toast = (m) => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
const escape = (s) => s ? String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) : 'N/A';

// --- Data Layer ---
async function initSession(session){
  state.session = session;
  const {data:prof} = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  state.profile = prof;
  
  if(!prof) { state.screen = 'setup-profile'; render(); return; }

  const {data:g} = await sb.from('goals').select('*').eq('user_id', session.user.id).maybeSingle();
  state.goals = g || { calories: 2000, profile: {} };

  const {data:l} = await sb.from('logs').select('*').eq('user_id', session.user.id).eq('log_date', state.today).maybeSingle();
  state.log = l || { foods:[], water_entries:[], water_oz:0 };

  const {data:w} = await sb.from('weights').select('*').eq('user_id', session.user.id).order('log_date', {ascending:false}).limit(30);
  state.weightHistory = w || [];

  const {data:r} = await sb.from('recipes').select('*').eq('user_id', session.user.id);
  state.savedRecipes = r || [];

  state.screen = 'app';
  render();
}

async function searchUSDA(query) {
  const cache = localStorage.getItem(`usda_${query.toLowerCase()}`);
  if(cache) return JSON.parse(cache);
  
  const res = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${USDA_API_KEY}&query=${encodeURIComponent(query)}&pageSize=10`);
  const data = await res.json();
  const results = (data.foods || []).map(f => {
    const nut = f.foodNutrients || [];
    const get = (id) => nut.find(n => n.nutrientId === id || n.nutrientName?.toLowerCase().includes(id.toLowerCase()))?.value || 0;
    return {
      name: f.description, brand: f.brandOwner || 'USDA',
      per100: { calories: get('energy'), protein: get('protein'), fat: get('total lipid'), carbs: get('carbohydrate'), fiber: get('fiber'), sodium: get('sodium') }
    };
  });
  localStorage.setItem(`usda_${query.toLowerCase()}`, JSON.stringify(results));
  return results;
}

// --- Shared Search Component ---
function renderSearch(placeholder, onSelect, includeRecipes = false) {
  const container = el(`<div style="position:relative"></div>`);
  const input = el(`<input placeholder="${placeholder}" autocomplete="off">`);
  const results = el(`<div class="search-results" style="display:none"></div>`);
  
  let debounce;
  input.oninput = () => {
    clearTimeout(debounce);
    if(input.value.length < 2) { results.style.display = 'none'; return; }
    debounce = setTimeout(async () => {
      results.innerHTML = `<div class="empty">Searching...</div>`;
      results.style.display = 'block';
      let list = await searchUSDA(input.value);
      if(includeRecipes) {
        const matches = state.savedRecipes.filter(r => r.name.toLowerCase().includes(input.value.toLowerCase()));
        list = [...matches.map(m => ({...m, isRecipe: true})), ...list];
      }
      results.innerHTML = '';
      list.forEach(item => {
        const row = el(`<div class="search-item"><b>${escape(item.name)}</b><div class="entry-meta">${item.isRecipe ? 'Saved Recipe' : escape(item.brand)}</div></div>`);
        row.onclick = () => { onSelect(item); results.style.display='none'; input.value=''; };
        results.appendChild(row);
      });
    }, 400);
  };
  container.append(input, results);
  return container;
}

// --- UI Views ---
function renderLog(){
  const wrap = el(`<div></div>`);
  const totals = state.log.foods.reduce((acc, f) => {
    acc.c += f.calories || 0; acc.p += f.protein || 0; acc.f += f.fat || 0; acc.fb += f.fiber || 0;
    return acc;
  }, {c:0, p:0, f:0, fb:0});

  // Calculate Score Fix: If no food, score is 0.
  let score = 0;
  if(state.log.foods.length > 0) {
    const cScore = Math.max(0, 100 - (Math.abs(totals.c - state.goals.calories) / state.goals.calories * 100));
    const pScore = Math.min(100, (totals.p / state.goals.protein * 100));
    score = Math.round((cScore + pScore) / 2);
  }

  const rings = el(`<div class="ring-row">
    <div class="ring-card"><div class="ring" style="--pct:${score};--ring-color:var(--mint)"><div class="ring-val">${score}%</div></div><div class="ring-label">Score</div></div>
    <div class="ring-card"><div class="ring" style="--pct:${Math.min(100,(totals.c/state.goals.calories)*100)};--ring-color:var(--ember)"><div class="ring-val">${Math.round(totals.c)}</div></div><div class="ring-label">Calories</div></div>
    <div class="ring-card"><div class="ring" style="--pct:${Math.min(100,(totals.p/state.goals.protein)*100)};--ring-color:var(--signal)"><div class="ring-val">${Math.round(totals.p)}g</div></div><div class="ring-label">Protein</div></div>
    <div class="ring-card"><div class="ring" style="--pct:${Math.min(100,(state.log.water_oz/state.goals.water_oz)*100)};--ring-color:var(--signal)"><div class="ring-val">${state.log.water_oz}oz</div></div><div class="ring-label">Water</div></div>
  </div>`);
  wrap.appendChild(rings);

  // Weight Card
  const weightCard = el(`<div class="card"><div class="card-title">Weight Trend</div>
    <div class="row"><input id="w-input" type="number" step="0.1" placeholder="Today's lb"><button class="btn" id="w-save">Log</button></div>
    <div class="chart-container"><canvas id="w-chart"></canvas></div>
  </div>`);
  wrap.appendChild(weightCard);

  // Food Logging
  const foodCard = el(`<div class="card"><div class="card-title">Log Food</div></div>`);
  foodCard.appendChild(renderSearch("Search foods or recipes...", async (item) => {
    let entry;
    if(item.isRecipe) {
      entry = { name: item.name, calories: item.per100.calories, protein: item.per100.protein, fat: item.per100.fat, fiber: item.per100.fiber };
    } else {
      const g = prompt(`Grams of ${item.name}?`, "100");
      if(!g) return;
      const m = parseFloat(g)/100;
      entry = { name: `${item.name} (${g}g)`, calories: item.per100.calories*m, protein: item.per100.protein*m, fat: item.per100.fat*m, fiber: item.per100.fiber*m };
    }
    state.log.foods.push(entry);
    await sb.from('logs').upsert({ user_id: state.session.user.id, log_date: state.today, foods: state.log.foods, water_oz: state.log.water_oz });
    render();
  }, true));
  wrap.appendChild(foodCard);

  // Food List
  const listCard = el(`<div class="card"><div class="card-title">Today's Entries</div><div id="log-list"></div></div>`);
  state.log.foods.forEach((f, i) => {
    const row = el(`<div class="entry"><div><div class="entry-name">${escape(f.name)}</div><div class="entry-meta">${Math.round(f.calories)} kcal</div></div><button class="del-btn">✕</button></div>`);
    row.querySelector('.del-btn').onclick = async () => { state.log.foods.splice(i, 1); await sb.from('logs').update({foods: state.log.foods}).eq('user_id', state.session.user.id).eq('log_date', state.today); render(); };
    listCard.querySelector('#log-list').appendChild(row);
  });
  wrap.appendChild(listCard);

  // Weight Logic
  setTimeout(() => {
    const ctx = document.getElementById('w-chart')?.getContext('2d');
    if(!ctx) return;
    new Chart(ctx, {
      type: 'line',
      data: { labels: state.weightHistory.map(w => w.log_date.slice(5)).reverse(), datasets: [{ label: 'Weight', data: state.weightHistory.map(w => w.weight_lb).reverse(), borderColor: '#48C7FF', fill: true, backgroundColor: 'rgba(72,199,255,0.1)', tension: 0.3 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }, 100);

  weightCard.querySelector('#w-save').onclick = async () => {
    const val = parseFloat(weightCard.querySelector('#w-input').value);
    if(!val) return;
    await sb.from('weights').upsert({ user_id: state.session.user.id, log_date: state.today, weight_lb: val });
    toast("Weight Logged");
    initSession(state.session);
  };

  return wrap;
}

function renderRecipes() {
  const wrap = el(`<div></div>`);
  const builder = el(`<div class="card"><div class="card-title">Recipe Builder</div>
    <div class="field"><label>Recipe Name</label><input id="rn" placeholder="e.g. Protein Chili"></div>
    <div id="rs"></div>
    <div id="ri" style="margin: 10px 0"></div>
    <button class="btn full" id="rb">Save Recipe</button>
  </div>`);
  
  builder.querySelector('#rs').appendChild(renderSearch("Add ingredient...", (item) => {
    const g = prompt(`Grams of ${item.name}?`, "100");
    if(!g) return;
    state.recipeDraft.ingredients.push({...item, grams: parseFloat(g)});
    render();
  }));

  state.recipeDraft.ingredients.forEach((ing, i) => {
    const row = el(`<div class="entry"><div>${escape(ing.name)} (${ing.grams}g)</div><button class="del-btn">✕</button></div>`);
    row.onclick = () => { state.recipeDraft.ingredients.splice(i,1); render(); };
    builder.querySelector('#ri').appendChild(row);
  });

  builder.querySelector('#rb').onclick = async () => {
    const name = builder.querySelector('#rn').value;
    if(!name || !state.recipeDraft.ingredients.length) return toast("Missing info");
    const totals = state.recipeDraft.ingredients.reduce((acc, ing) => {
      const m = ing.grams/100;
      acc.c += ing.per100.calories*m; acc.p += ing.per100.protein*m; acc.f += ing.per100.fat*m; acc.fb += ing.per100.fiber*m;
      return acc;
    }, {c:0, p:0, f:0, fb:0});
    await sb.from('recipes').insert({ user_id: state.session.user.id, name, ingredients: state.recipeDraft.ingredients, per100: totals });
    state.recipeDraft = { name: '', ingredients: [] };
    toast("Recipe Saved");
    initSession(state.session);
  };
  wrap.appendChild(builder);

  const list = el(`<div class="card"><div class="card-title">Saved Recipes</div><div id="sl"></div></div>`);
  state.savedRecipes.forEach(r => {
    const row = el(`<div class="entry"><div>${escape(r.name)}</div><button class="del-btn">✕</button></div>`);
    row.querySelector('.del-btn').onclick = async () => { await sb.from('recipes').delete().eq('id', r.id); initSession(state.session); };
    list.querySelector('#sl').appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function renderGoals(){
  const wrap = el(`<div></div>`);
  const p = state.goals.profile || {};
  const calc = el(`<div class="card"><div class="card-title">Nutrition Calculator</div>
    <div class="row"><div class="field"><label>Age</label><input id="ca" type="number" value="${p.age||''}"></div><div class="field"><label>Weight (lb)</label><input id="cw" type="number" value="${p.weight||''}"></div></div>
    <div class="row"><div class="field"><label>Height (in)</label><input id="ch" type="number" value="${p.height||''}"></div><div class="field"><label>Gender</label><select id="cg"><option value="male" ${p.gender==='male'?'selected':''}>Male</option><option value="female" ${p.gender==='female'?'selected':''}>Female</option></select></div></div>
    <button class="btn full" id="cs">Recalculate & Save</button>
  </div>`);

  calc.querySelector('#cs').onclick = async () => {
    const age = parseInt(calc.querySelector('#ca').value);
    const weight = parseFloat(calc.querySelector('#cw').value);
    const height = parseFloat(calc.querySelector('#ch').value);
    const gen = calc.querySelector('#cg').value;
    
    // Mifflin-St Jeor
    const bmr = (10 * (weight * 0.4535)) + (6.25 * (height * 2.54)) - (5 * age) + (gen === 'male' ? 5 : -161);
    const tdee = Math.round(bmr * 1.4);

    state.goals.calories = tdee;
    state.goals.protein = Math.round(weight * 0.9);
    state.goals.water_oz = Math.round(weight * 0.6);
    state.goals.profile = { age, weight, height, gender: gen };

    await sb.from('goals').upsert({ user_id: state.session.user.id, ...state.goals });
    toast("Goals Saved Locally & Remotely");
    render();
  };
  wrap.appendChild(calc);
  
  const privacy = el(`<div class="card"><div class="card-title">Privacy</div><div class="entry">Show me on Leaderboard <button class="btn small" id="pt">${state.profile.leaderboard_visible ? 'ON' : 'OFF'}</button></div></div>`);
  privacy.querySelector('#pt').onclick = async () => {
    const next = !state.profile.leaderboard_visible;
    await sb.from('profiles').update({ leaderboard_visible: next }).eq('id', state.session.user.id);
    initSession(state.session);
  };
  wrap.appendChild(privacy);
  return wrap;
}

// --- App Shell ---
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(state.screen === 'loading') { app.innerHTML = `<div class="empty">Authenticating...</div>`; return; }
  if(state.screen === 'auth') { app.appendChild(renderAuth()); return; }
  if(state.screen === 'setup-profile') { app.appendChild(renderSetup()); return; }

  app.innerHTML = `<div class="topbar"><div class="brand"><div class="brand-mark">FL</div><div><div class="brand-name">Fuel Ledger</div><div class="brand-sub">Health OS</div></div></div><div class="date-pill">${state.today}</div></div>
    <div class="nav">
      <button class="${state.tab==='log'?'active':''}" onclick="state.tab='log';render()">Log</button>
      <button class="${state.tab==='recipes'?'active':''}" onclick="state.tab='recipes';render()">Recipes</button>
      <button class="${state.tab==='goals'?'active':''}" onclick="state.tab='goals';render()">Goals</button>
    </div><div class="view" id="view"></div>`;

  const v = document.getElementById('view');
  if(state.tab === 'log') v.appendChild(renderLog());
  if(state.tab === 'recipes') v.appendChild(renderRecipes());
  if(state.tab === 'goals') v.appendChild(renderGoals());
}

function renderAuth() {
  const wrap = el(`<div style="padding:100px 20px; text-align:center;"><div class="brand-mark" style="width:60px;height:60px;margin:0 auto 20px;font-size:24px">FL</div><h2>Fuel Ledger</h2>
    <div class="field"><input id="ae" placeholder="Email"></div><div class="field"><input id="ap" type="password" placeholder="Password"></div>
    <button class="btn full" id="as">Sign In / Sign Up</button>
  </div>`);
  wrap.querySelector('#as').onclick = async () => {
    const email = wrap.querySelector('#ae').value; const password = wrap.querySelector('#ap').value;
    const {error} = await sb.auth.signInWithPassword({ email, password });
    if(error) await sb.auth.signUp({ email, password });
  };
  return wrap;
}

function renderSetup() {
  const wrap = el(`<div style="padding:100px 20px; text-align:center;"><h2>Choose Username</h2><div class="field"><input id="un" placeholder="Username"></div><button class="btn full" id="us">Finish</button></div>`);
  wrap.querySelector('#us').onclick = async () => {
    const username = wrap.querySelector('#un').value;
    await sb.from('profiles').insert({ id: state.session.user.id, username });
    initSession(state.session);
  };
  return wrap;
}

sb.auth.onAuthStateChange((event, session) => { if(session) initSession(session); else { state.screen='auth'; render(); } });
</script>
</body>
</html>
