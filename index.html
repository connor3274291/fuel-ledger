<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0E1116; --panel:#171C24; --panel-2:#1E2530; --line:#2A3240;
    --fog:#8B95A5; --fog-dim:#5C6675; --paper:#EDF0F4;
    --signal:#48C7FF; --signal-dim:#1F4A5C; --ember:#FF8A4C; --mint:#5FE3A6;
    --violet:#B18BFF; --danger:#FF6B6B; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--ink);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:0 0 100px;min-height:100vh;}
  .topbar{padding:22px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,17,22,0.92);backdrop-filter:blur(8px);z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--signal),var(--mint));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:15px;}
  .brand-name{font-weight:700;font-size:17px;}
  .brand-sub{font-size:10.5px;color:var(--fog-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
  .date-pill{font-size:12px;color:var(--fog);background:var(--panel);border:1px solid var(--line);padding:6px 10px;border-radius:20px;}
  .who-banner{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:14px 18px 0;font-size:12px;}
  .who-banner .who-name{color:var(--paper);font-weight:700;}
  .who-banner button{background:none;border:none;color:var(--fog-dim);font-size:11.5px;cursor:pointer;text-decoration:underline;}
  .who-banner button:hover{color:var(--danger);}
  .nav{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto;}
  .nav button{background:transparent;border:1px solid var(--line);color:var(--fog);padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .nav button.active{background:var(--paper);color:var(--ink);border-color:var(--paper);}
  .view{padding:16px 18px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-title{font-weight:700;font-size:15px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
  .card-title .tag{font-size:10.5px;color:var(--fog-dim);font-weight:400;}
  textarea,input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--paper);border-radius:10px;padding:11px 12px;font-size:14px;resize:none;outline:none;}
  textarea:focus,input:focus,select:focus{border-color:var(--signal);}
  label{font-size:11.5px;color:var(--fog);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:6px;font-weight:600;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .btn{font-weight:700;font-size:14px;background:var(--signal);color:var(--ink);border:none;border-radius:10px;padding:12px 16px;cursor:pointer;}
  .btn:hover{opacity:0.92;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn.small{padding:7px 12px;font-size:12.5px;border-radius:8px;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:0.5;cursor:default;}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .entry:last-child{border-bottom:none;}
  .entry-name{font-size:13.5px;font-weight:600;}
  .entry-meta{font-size:11px;color:var(--fog);margin-top:2px;}
  .entry-cals{font-size:13px;color:var(--signal);font-weight:700;}
  .del-btn{background:none;border:none;color:var(--fog-dim);cursor:pointer;font-size:15px;padding:0 0 0 10px;}
  .del-btn:hover{color:var(--danger);}
  .empty{color:var(--fog-dim);font-size:13px;text-align:center;padding:20px 0;}
  .water-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .water-chip{background:var(--panel-2);border:1px solid var(--line);color:var(--paper);padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;}
  .water-chip:hover{border-color:var(--signal);color:var(--signal);}
  .supp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .supp-row:last-child{border-bottom:none;}
  .check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--fog-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;}
  .check.on{background:var(--mint);border-color:var(--mint);color:var(--ink);}
  .supp-name{font-size:13.5px;font-weight:600;flex:1;}
  .supp-dose{font-size:11.5px;color:var(--fog);}
  .ring-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;}
  .ring-card{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;width:104px;text-align:center;}
  .ring{width:64px;height:64px;border-radius:50%;margin:0 auto 8px;position:relative;display:flex;align-items:center;justify-content:center;}
  .ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring-color) calc(var(--pct)*1%), var(--panel-2) 0);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));}
  .ring-val{font-size:12px;font-weight:700;position:relative;z-index:2;}
  .ring-label{font-size:10.5px;color:var(--fog);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .ring-sub{font-size:10px;color:var(--fog-dim);margin-top:1px;}
  .result-box{background:var(--panel-2);border:1px solid var(--signal-dim);border-radius:12px;padding:16px;margin-top:14px;}
  .result-headline{font-size:28px;font-weight:700;color:var(--signal);line-height:1;}
  .result-sub{font-size:12.5px;color:var(--fog);margin-top:4px;}
  .macro-strip{display:flex;gap:14px;margin-top:14px;}
  .macro-cell{flex:1;text-align:center;}
  .macro-cell .n{font-size:16px;font-weight:700;}
  .macro-cell .l{font-size:10px;color:var(--fog-dim);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{font-size:13px;color:var(--fog-dim);width:22px;}
  .lb-rank.gold{color:#FFD166;} .lb-rank.silver{color:#C9CFDA;} .lb-rank.bronze{color:#D89B6C;}
  .lb-name{flex:1;font-size:13.5px;font-weight:600;}
  .lb-name.me{color:var(--signal);}
  .lb-score{font-size:15px;font-weight:700;color:var(--mint);}
  .hint{font-size:11.5px;color:var(--fog-dim);margin-top:8px;line-height:1.5;}
  .micro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .micro-item{background:var(--panel-2);border-radius:10px;padding:10px 12px;}
  .micro-name{font-size:11px;color:var(--fog);text-transform:uppercase;letter-spacing:0.5px;}
  .micro-bar{height:5px;background:var(--line);border-radius:3px;margin:6px 0 4px;overflow:hidden;}
  .micro-fill{height:100%;background:var(--violet);border-radius:3px;}
  .micro-val{font-size:11px;color:var(--fog);}
  .add-row{display:flex;gap:8px;margin-top:10px;}
  .add-row input{flex:1;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--paper);color:var(--ink);padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
  .toast.show{opacity:1;}
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{max-width:380px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 24px;}
  .auth-mark{width:52px;height:52px;border-radius:14px;margin:0 auto 16px;background:linear-gradient(135deg,var(--signal),var(--mint));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:22px;}
  .auth-title{font-weight:700;font-size:19px;margin-bottom:6px;text-align:center;}
  .auth-sub{font-size:13px;color:var(--fog);line-height:1.5;margin-bottom:20px;text-align:center;}
  .agree-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0;font-size:12px;color:var(--fog);}
  .agree-row input{width:auto;margin-top:2px;}
  .agree-row a{color:var(--signal);}
  .auth-toggle{text-align:center;margin-top:14px;font-size:12.5px;color:var(--fog);}
  .auth-toggle a{color:var(--signal);cursor:pointer;text-decoration:underline;}
  .auth-error{color:var(--danger);font-size:12.5px;margin-top:8px;text-align:center;}
  .disclaimer-footer{text-align:center;padding:20px 18px 0;font-size:11px;color:var(--fog-dim);line-height:1.6;}
  .disclaimer-footer a{color:var(--fog);}
  ::-webkit-scrollbar{height:0;width:6px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — paste your own Supabase project values here
   Get these from: Supabase Dashboard → Project Settings → API
   ============================================================ */
const SUPABASE_URL = "https://ylpjxopozaoukscimcuu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_zFadyxaU05CDefBzIpcg9A_7TlhYemv";

const sb = (SUPABASE_URL.startsWith("http")) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// Bump this any time terms.html or privacy.html materially change.
// Existing users are NOT re-prompted unless you add logic to check it against their stored version.
const CURRENT_TERMS_VERSION = "2026-07-07";

const DEFAULT_GOALS = {
  calories: 2400, protein: 160, carbs: 260, fat: 75, fiber: 30, sugar_limit: 30, sodium_limit: 2300, water_oz: 100,
  sat_fat_limit: 24, trans_fat_limit: 2, added_sugar_limit: 30, cholesterol_limit: 300,
  micros: {
    "Vitamin C (mg)": 90, "Vitamin D (mcg)": 20, "Calcium (mg)": 1300,
    "Iron (mg)": 18, "Potassium (mg)": 3400, "Magnesium (mg)": 400,
    "Zinc (mg)": 11, "Vitamin B12 (mcg)": 2.4,
    "Vitamin A (mcg)": 900, "Vitamin E (mg)": 15, "Vitamin K (mcg)": 120, "Folate (mcg)": 400
  },
  supplements: [{name:"Multivitamin", dose:"1 tablet"}, {name:"Vitamin D3", dose:"2000 IU"}],
  profile: null // { gender, age, heightIn, weightLb, activity, goal, rateLbWk } — powers dynamic goal recalculation
};

// Standard adult RDAs by gender/age — used to auto-update micro targets from the calculator.
function computeMicroTargets(gender, age){
  const older = age >= 51;
  return {
    "Vitamin C (mg)": gender==='male' ? 90 : 75,
    "Vitamin D (mcg)": age >= 71 ? 20 : 15,
    "Calcium (mg)": older ? (gender==='male' && age<71 ? 1000 : 1200) : 1000,
    "Iron (mg)": gender==='male' ? 8 : (older ? 8 : 18),
    "Potassium (mg)": gender==='male' ? 3400 : 2600,
    "Magnesium (mg)": gender==='male' ? (age>30?420:400) : (age>30?320:310),
    "Zinc (mg)": gender==='male' ? 11 : 8,
    "Vitamin B12 (mcg)": 2.4,
    "Vitamin A (mcg)": gender==='male' ? 900 : 700,
    "Vitamin E (mg)": 15,
    "Vitamin K (mcg)": gender==='male' ? 120 : 90,
    "Folate (mcg)": 400
  };
}

let state = {
  screen: 'loading', // loading | auth | app
  authMode: 'signin', // signin | signup
  session: null,
  profile: null,
  goals: null,
  tab: 'log',
  today: dateKey(new Date()),
  log: null,
  recipeDraft: { name:'', ingredients:[], cookedWeight:null, servings:1 },
};

function dateKey(d){ return d.toISOString().slice(0,10); }
function todayNice(){ return new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function escapeHtml(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function round1(n){ return Math.round(n*10)/10; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------------- Data layer (Supabase) ---------------- */
async function fetchProfile(userId){
  const { data } = await sb.from('profiles').select('*').eq('id', userId).maybeSingle();
  return data;
}
async function createProfile(userId, username){
  const { error } = await sb.from('profiles').insert({
    id:userId, username, leaderboard_visible: true,
    terms_version: CURRENT_TERMS_VERSION,
    terms_accepted_at: new Date().toISOString()
  });
  if(error) throw error;
  localStorage.removeItem('fl_pending_username');
}
async function setLeaderboardVisible(userId, visible){
  await sb.from('profiles').update({ leaderboard_visible: visible }).eq('id', userId);
  state.profile.leaderboard_visible = visible;
  if(!visible) await sb.from('leaderboard').delete().eq('user_id', userId).eq('log_date', state.today);
  else await pushToLeaderboard();
}
async function recordTermsAcceptance(userId){
  await sb.from('profiles').update({
    terms_version: CURRENT_TERMS_VERSION, terms_accepted_at: new Date().toISOString()
  }).eq('id', userId);
}
async function fetchGoals(userId){
  const { data } = await sb.from('goals').select('*').eq('user_id', userId).maybeSingle();
  if(!data){
    const g = { user_id:userId, ...DEFAULT_GOALS };
    await sb.from('goals').upsert(g);
    return g;
  }
  // Backfill any fields that predate this update, so older accounts don't break.
  if(data.fiber==null) data.fiber = DEFAULT_GOALS.fiber;
  if(data.sugar_limit==null) data.sugar_limit = DEFAULT_GOALS.sugar_limit;
  if(data.sodium_limit==null) data.sodium_limit = DEFAULT_GOALS.sodium_limit;
  if(data.sat_fat_limit==null) data.sat_fat_limit = DEFAULT_GOALS.sat_fat_limit;
  if(data.trans_fat_limit==null) data.trans_fat_limit = DEFAULT_GOALS.trans_fat_limit;
  if(data.added_sugar_limit==null) data.added_sugar_limit = DEFAULT_GOALS.added_sugar_limit;
  if(data.cholesterol_limit==null) data.cholesterol_limit = DEFAULT_GOALS.cholesterol_limit;
  if(data.profile===undefined) data.profile = null;
  // Backfill any newer micro targets that predate this account without clobbering user edits.
  data.micros = data.micros || {};
  Object.keys(DEFAULT_GOALS.micros).forEach(k=>{ if(data.micros[k]==null) data.micros[k] = DEFAULT_GOALS.micros[k]; });
  return data;
}
async function saveGoalsRemote(){
  const g = state.goals;
  await sb.from('goals').upsert({
    user_id: state.session.user.id, calories:g.calories, protein:g.protein, carbs:g.carbs, fat:g.fat,
    fiber:g.fiber, sugar_limit:g.sugar_limit, sodium_limit:g.sodium_limit,
    sat_fat_limit:g.sat_fat_limit, trans_fat_limit:g.trans_fat_limit,
    added_sugar_limit:g.added_sugar_limit, cholesterol_limit:g.cholesterol_limit,
    water_oz:g.water_oz, micros:g.micros, supplements:g.supplements, profile:g.profile,
    updated_at:new Date().toISOString()
  });
}
async function fetchDay(userId, dateStr){
  const { data } = await sb.from('logs').select('*').eq('user_id', userId).eq('log_date', dateStr).maybeSingle();
  if(!data) return { foods:[], water_entries:[], water_oz:0, supplements:[] };
  // Migrate legacy rows that only had a raw water_oz number, so a prior total isn't lost.
  if(!data.water_entries || !data.water_entries.length){
    data.water_entries = (data.water_oz && data.water_oz>0) ? [{ id:'legacy', oz:data.water_oz, time:Date.now() }] : [];
  }
  return data;
}
function recalcWaterTotal(day){
  day.water_oz = (day.water_entries||[]).reduce((sum,e)=>sum+(e.oz||0),0);
  return day.water_oz;
}
async function saveDayRemote(){
  recalcWaterTotal(state.log);
  await sb.from('logs').upsert({
    user_id: state.session.user.id, log_date: state.today,
    foods: state.log.foods, water_entries: state.log.water_entries, water_oz: state.log.water_oz,
    supplements: state.log.supplements, updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,log_date' });
}
async function fetchWeights(userId, limit){
  const { data } = await sb.from('weights').select('*').eq('user_id', userId).order('log_date',{ ascending:false }).limit(limit||14);
  return data || [];
}
async function saveWeight(userId, dateStr, weightLb){
  await sb.from('weights').upsert({ user_id:userId, log_date:dateStr, weight_lb:weightLb, updated_at:new Date().toISOString() }, { onConflict:'user_id,log_date' });
}
async function deleteWeight(userId, dateStr){
  await sb.from('weights').delete().eq('user_id',userId).eq('log_date',dateStr);
}
function closeness(actual, target){ if(!target||target<=0) return null; const d=Math.abs(actual-target)/target*100; return Math.max(0,100-d*1.6); }
function capPct(actual, target){ if(!target||target<=0) return null; return Math.min(100,(actual/target)*100); }
function underLimitScore(actual, limit){
  if(!limit || limit<=0) return null;
  if(actual<=limit) return 100;
  const overPct = (actual-limit)/limit*100;
  return Math.max(0, 100 - overPct*1.6);
}
function computeTotals(day){
  const t={calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,sodium:0,
    sat_fat:0,trans_fat:0,unsat_fat:0,added_sugar:0,cholesterol:0,micros:{}};
  Object.keys(state.goals.micros||{}).forEach(m=>t.micros[m]=0);
  (day.foods||[]).forEach(f=>{
    t.calories+=f.calories||0; t.protein+=f.protein_g||0; t.carbs+=f.carbs_g||0; t.fat+=f.fat_g||0;
    t.fiber+=f.fiber_g||0; t.sugar+=f.sugar_g||0; t.sodium+=f.sodium_mg||0;
    t.sat_fat+=f.sat_fat_g||0; t.trans_fat+=f.trans_fat_g||0; t.unsat_fat+=f.unsat_fat_g||0;
    t.added_sugar+=f.added_sugar_g||0; t.cholesterol+=f.cholesterol_mg||0;
    if(f.micros) Object.keys(f.micros).forEach(m=>{ if(t.micros[m]!=null && f.micros[m]!=null) t.micros[m]+=f.micros[m]||0; });
  });
  return t;
}
function computeDayScoreDetail(day){
  const g=state.goals, t=computeTotals(day), parts=[];
  const cCal=closeness(t.calories,g.calories); if(cCal!=null) parts.push({label:'Calories', pct:cCal});
  const macroScores=[closeness(t.protein,g.protein),closeness(t.carbs,g.carbs),closeness(t.fat,g.fat)].filter(x=>x!=null);
  if(macroScores.length) parts.push({label:'Protein/carbs/fat', pct: macroScores.reduce((a,b)=>a+b,0)/macroScores.length});
  const fiberScore=capPct(t.fiber,g.fiber); if(fiberScore!=null) parts.push({label:'Fiber', pct:fiberScore});
  const sugarScore=underLimitScore(t.sugar,g.sugar_limit); if(sugarScore!=null) parts.push({label:'Sugar limit', pct:sugarScore});
  const sodiumScore=underLimitScore(t.sodium,g.sodium_limit); if(sodiumScore!=null) parts.push({label:'Sodium limit', pct:sodiumScore});
  const satFatScore=underLimitScore(t.sat_fat,g.sat_fat_limit); if(satFatScore!=null) parts.push({label:'Saturated fat limit', pct:satFatScore});
  const transFatScore=underLimitScore(t.trans_fat,g.trans_fat_limit); if(transFatScore!=null) parts.push({label:'Trans fat limit', pct:transFatScore});
  const addedSugarScore=underLimitScore(t.added_sugar,g.added_sugar_limit); if(addedSugarScore!=null) parts.push({label:'Added sugar limit', pct:addedSugarScore});
  const cholScore=underLimitScore(t.cholesterol,g.cholesterol_limit); if(cholScore!=null) parts.push({label:'Cholesterol limit', pct:cholScore});
  const wScore=capPct(day.water_oz||0,g.water_oz); if(wScore!=null) parts.push({label:'Water', pct:wScore});
  if(g.supplements && g.supplements.length){
    const taken=(day.supplements||[]).filter(s=>s.taken).length;
    parts.push({label:'Supplements', pct: Math.min(100,(taken/g.supplements.length)*100)});
  }
  const mk=Object.keys(g.micros||{});
  if(mk.length){
    const ms=mk.map(m=>capPct(t.micros[m]||0,g.micros[m])).filter(x=>x!=null);
    if(ms.length) parts.push({label:'Micronutrients (avg of '+mk.length+')', pct: ms.reduce((a,b)=>a+b,0)/ms.length});
  }
  const score = parts.length ? Math.round(parts.reduce((a,b)=>a+b.pct,0)/parts.length) : 0;
  return { score, parts };
}
function computeDayScore(day){ return computeDayScoreDetail(day).score; }
async function pushToLeaderboard(){
  const score = computeDayScore(state.log);
  if(state.profile.leaderboard_visible === false){
    await sb.from('leaderboard').delete().eq('user_id', state.session.user.id).eq('log_date', state.today);
    return;
  }
  await sb.from('leaderboard').upsert({
    user_id: state.session.user.id, log_date: state.today, username: state.profile.username, score,
    updated_at: new Date().toISOString()
  }, { onConflict:'user_id,log_date' });
}

async function computeStreak(userId){
  const { data } = await sb.from('logs').select('log_date').eq('user_id', userId).order('log_date', { ascending:false }).limit(400);
  if(!data || !data.length) return 0;
  const dates = new Set(data.map(d=>d.log_date));
  let streak = 0;
  let checkDate = new Date();
  if(!dates.has(dateKey(checkDate))) checkDate.setDate(checkDate.getDate()-1); // grace: today not logged yet
  while(dates.has(dateKey(checkDate))){
    streak++;
    checkDate.setDate(checkDate.getDate()-1);
  }
  return streak;
}
// Free USDA food database search — no cost, no account required to start.
// DEMO_KEY works out of the box but is rate-limited across everyone using it.
// For a smoother experience, get your own free key (30 seconds, no card required)
// at https://fdc.nal.usda.gov/api-key-signup and paste it below.
const USDA_API_KEY = "DEMO_KEY";

const usdaCache = new Map(); // query -> results, avoids re-hitting the API for repeat searches this session
async function searchFoodDB(query){
  const key = query.trim().toLowerCase();
  if(usdaCache.has(key)) return usdaCache.get(key);
  const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${USDA_API_KEY}&query=${encodeURIComponent(query)}&pageSize=8`;
  const resp = await fetch(url);
  if(!resp.ok){
    if(resp.status === 429 || resp.status === 403){
      throw new Error("USDA's shared free key is rate-limited right now — get your own free key at fdc.nal.usda.gov/api-key-signup (30 seconds, no card) and paste it into USDA_API_KEY in index.html.");
    }
    throw new Error('Search failed — try again in a moment.');
  }
  const data = await resp.json();
  const results = (data.foods||[]).map(food=>{
    const nutrients = food.foodNutrients || [];
    // Returns null (not 0) when USDA doesn't report a nutrient for this food, so the UI can
    // show "N/A" instead of implying the food genuinely has zero of it.
    const find = (needle) => { const n = nutrients.find(x=>(x.nutrientName||'').toLowerCase().includes(needle)); return n ? n.value : null; };
    const findOrZero = (needle) => { const v = find(needle); return v==null ? 0 : v; };
    return {
      name: food.description,
      brand: food.brandOwner || food.brandName || '',
      per100g: {
        calories: findOrZero('energy'),
        protein: findOrZero('protein'),
        fat: findOrZero('total lipid'),
        carbs: findOrZero('carbohydrate'),
        fiber: findOrZero('fiber'),
        sugar: findOrZero('sugars'),
        sodium: findOrZero('sodium'),
        sat_fat: find('fatty acids, total saturated'),
        trans_fat: find('fatty acids, total trans'),
        unsat_fat: (()=>{ const mono=find('fatty acids, total monounsaturated'); const poly=find('fatty acids, total polyunsaturated'); return (mono==null && poly==null) ? null : (mono||0)+(poly||0); })(),
        added_sugar: find('sugars, added'),
        cholesterol: find('cholesterol'),
        caffeine: find('caffeine'),
        micros: {
          "Vitamin C (mg)": find('vitamin c'),
          "Vitamin D (mcg)": find('vitamin d'),
          "Calcium (mg)": find('calcium'),
          "Iron (mg)": find('iron'),
          "Potassium (mg)": find('potassium'),
          "Magnesium (mg)": find('magnesium'),
          "Zinc (mg)": find('zinc'),
          "Vitamin B12 (mcg)": find('vitamin b-12'),
          "Vitamin A (mcg)": find('vitamin a, rae'),
          "Vitamin E (mg)": find('vitamin e'),
          "Vitamin K (mcg)": find('vitamin k'),
          "Folate (mcg)": find('folate, total')
        }
      }
    };
  });
  usdaCache.set(key, results);
  return results;
}

async function handleSignUp(email, password, username){
  if(!SUPABASE_URL.startsWith("http")){ toast("Supabase isn't configured yet — see SETUP.md"); return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error) throw error;
  if(data.session){
    await createProfile(data.user.id, username);
    await initSession(data.session);
  } else {
    // Email confirmation is required — we can't create the profile row until they're
    // actually signed in (RLS needs an authenticated session). Stash the username so
    // the post-confirmation screen can pre-fill it instead of asking cold.
    localStorage.setItem('fl_pending_username', username);
    toast("Check your email to confirm your account, then sign in.");
    state.authMode = 'signin';
    render();
  }
}
async function handleSignIn(email, password){
  if(!SUPABASE_URL.startsWith("http")){ toast("Supabase isn't configured yet — see SETUP.md"); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error) throw error;
  await initSession(data.session);
}
async function handleSignOut(){
  await sb.auth.signOut();
  state.session = null; state.profile = null; state.goals = null; state.log = null;
  state.screen = 'auth'; state.authMode = 'signin';
  render();
}
async function initSession(session){
  state.session = session;
  state.profile = await fetchProfile(session.user.id);
  state.goals = await fetchGoals(session.user.id);
  state.log = await fetchDay(session.user.id, state.today);
  if(!state.profile){
    state.screen = 'needs-profile';
    render();
    return;
  }
  if(state.profile.terms_version !== CURRENT_TERMS_VERSION){
    state.screen = 'reconsent';
    render();
    return;
  }
  state.screen = 'app';
  render();
}

function ringCard(label,val,target,colorVar,sub){
  const pct = target ? Math.min(100,(val/target*100)) : 0;
  const colorValue = colorVar.startsWith('--') ? `var(${colorVar})` : colorVar;
  return `<div class="ring-card"><div class="ring" style="--pct:${pct};--ring-color:${colorValue};"><div class="ring-val">${Math.round(pct)}%</div></div><div class="ring-label">${label}</div><div class="ring-sub">${sub}</div></div>`;
}

function sumRecipe(ingredients){
  const t = {calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,sodium:0,micros:{}};
  ingredients.forEach(ing=>{
    const mult = ing.grams/100;
    t.calories += (ing.per100g.calories||0)*mult;
    t.protein += (ing.per100g.protein||0)*mult;
    t.carbs += (ing.per100g.carbs||0)*mult;
    t.fat += (ing.per100g.fat||0)*mult;
    t.fiber += (ing.per100g.fiber||0)*mult;
    t.sugar += (ing.per100g.sugar||0)*mult;
    t.sodium += (ing.per100g.sodium||0)*mult;
    Object.keys(ing.per100g.micros||{}).forEach(k=>{
      t.micros[k] = (t.micros[k]||0) + (ing.per100g.micros[k]||0)*mult;
    });
  });
  return t;
}

async function loadLeaderboard(container){
  const body = container.querySelector('#lb-body');
  try{
    const { data, error } = await sb.from('leaderboard').select('*').eq('log_date', state.today).order('score', { ascending:false });
    if(error) throw error;
    if(!data || !data.length){ body.innerHTML = `<div class="empty">No scores yet today.</div>`; return; }
    body.innerHTML = '';
    data.forEach((e,i)=>{
      const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const isMe = state.session && e.user_id === state.session.user.id;
      body.appendChild(el(`<div class="lb-row"><div class="lb-rank ${rankClass}">${i+1}</div><div class="lb-name ${isMe?'me':''}">${escapeHtml(e.username)}${isMe?' (you)':''}</div><div class="lb-score">${e.score}</div></div>`));
    });
  }catch(e){ body.innerHTML = `<div class="empty">Couldn't load the leaderboard.</div>`; }
}

function computeNutritionTargets(inputs){
  const { gender, age, heightIn, weightLb, activity, goal, rateLbWk } = inputs;
  const kg = weightLb * 0.453592;
  const cm = heightIn * 2.54;
  let bmr = gender === 'male'
    ? 10*kg + 6.25*cm - 5*age + 5
    : 10*kg + 6.25*cm - 5*age - 161;
  const activityMult = { sedentary:1.2, light:1.375, moderate:1.55, very:1.725, extreme:1.9 }[activity] || 1.2;
  const tdee = bmr * activityMult;
  const rate = rateLbWk || 0;
  const dailyAdjust = rate * 500; // ~500 kcal/day per lb/week of change, standard estimate
  let calories = tdee;
  if(goal === 'lose') calories = tdee - dailyAdjust;
  if(goal === 'gain') calories = tdee + dailyAdjust;
  calories = Math.max(1200, Math.round(calories));

  const protein = Math.round(weightLb * 0.9);
  const fat = Math.round((calories * 0.27) / 9);
  const carbsCals = Math.max(0, calories - (protein*4) - (fat*9));
  const carbs = Math.round(carbsCals / 4);
  const fiber = Math.round((calories/1000) * 14);
  const sodium = 2300;
  const addedSugar = gender === 'male' ? 36 : 25;
  const satFat = Math.round((calories * 0.10) / 9); // AHA: keep saturated fat under ~10% of calories
  const transFat = 2; // AHA guidance: as close to 0 as practical; small buffer for trace/labeling rounding
  const cholesterol = 300; // general public-health guideline
  const activityWaterBump = (activity==='very'||activity==='extreme') ? 16 : 0;
  const waterOz = Math.round(weightLb/2) + activityWaterBump;

  return { bmr:Math.round(bmr), tdee:Math.round(tdee), calories, protein, fat, carbs, fiber, sodium, addedSugar, satFat, transFat, cholesterol, waterOz };
}

function renderCalculatorCard(){
  const p = state.goals.profile || {};
  const card = el(`
    <div class="card">
      <div class="card-title">Daily nutrition calculator <span class="tag">Mifflin-St Jeor</span></div>
      <div class="row">
        <div class="field"><label>Gender</label><select id="c-gender"><option value="male">Male</option><option value="female">Female</option></select></div>
        <div class="field"><label>Age</label><input id="c-age" type="number" placeholder="years" value="${p.age||''}"></div>
      </div>
      <div class="row">
        <div class="field"><label>Height (in)</label><input id="c-height" type="number" placeholder="e.g. 70" value="${p.heightIn||''}"></div>
        <div class="field"><label>Weight (lb)</label><input id="c-weight" type="number" placeholder="e.g. 175" value="${p.weightLb||''}"></div>
      </div>
      <div class="field">
        <label>Activity level</label>
        <select id="c-activity">
          <option value="sedentary">Sedentary (little/no exercise)</option>
          <option value="light">Lightly active (1-3 days/wk)</option>
          <option value="moderate">Moderately active (3-5 days/wk)</option>
          <option value="very">Very active (6-7 days/wk)</option>
          <option value="extreme">Extremely active (physical job + training)</option>
        </select>
      </div>
      <div class="row">
        <div class="field">
          <label>Goal</label>
          <select id="c-goal"><option value="maintain">Maintain weight</option><option value="lose">Lose weight</option><option value="gain">Gain weight</option></select>
        </div>
        <div class="field"><label>Rate (lb/week, optional)</label><input id="c-rate" type="number" step="0.25" placeholder="e.g. 1" value="${p.rateLbWk||''}"></div>
      </div>
      <button class="btn full" id="c-calc">Apply as my daily targets</button>
      <div id="c-result"></div>
      <div class="hint">Uses the Mifflin-St Jeor equation for BMR, standard activity multipliers for TDEE, and general public-health guidelines (IOM fiber, AHA added sugar/saturated fat, FDA sodium/cholesterol) for the rest. All targets below — including water and every vitamin/mineral — recalculate automatically any time you change a field here. These are estimates, not a substitute for advice from a doctor or dietitian.</div>
    </div>
  `);
  card.querySelector('#c-gender').value = p.gender || 'male';
  card.querySelector('#c-activity').value = p.activity || 'moderate';
  card.querySelector('#c-goal').value = p.goal || 'maintain';

  const applyLive = async (showToast)=>{
    const gender = card.querySelector('#c-gender').value;
    const age = parseFloat(card.querySelector('#c-age').value);
    const heightIn = parseFloat(card.querySelector('#c-height').value);
    const weightLb = parseFloat(card.querySelector('#c-weight').value);
    const activity = card.querySelector('#c-activity').value;
    const goal = card.querySelector('#c-goal').value;
    const rateLbWk = parseFloat(card.querySelector('#c-rate').value) || 0;
    const resDiv = card.querySelector('#c-result');
    if(!age || !heightIn || !weightLb){ resDiv.innerHTML = ''; return; }
    const r = computeNutritionTargets({gender,age,heightIn,weightLb,activity,goal,rateLbWk});
    const micros = computeMicroTargets(gender, age);
    resDiv.innerHTML = '';
    resDiv.appendChild(el(`
      <div class="result-box">
        <div class="result-sub">BMR ${r.bmr} kcal · TDEE ${r.tdee} kcal</div>
        <div class="result-headline">${r.calories}</div>
        <div class="result-sub">recommended calories/day</div>
        <div class="macro-strip">
          <div class="macro-cell"><div class="n">${r.protein}g</div><div class="l">Protein</div></div>
          <div class="macro-cell"><div class="n">${r.carbs}g</div><div class="l">Carbs</div></div>
          <div class="macro-cell"><div class="n">${r.fat}g</div><div class="l">Fat</div></div>
        </div>
        <div class="macro-strip">
          <div class="macro-cell"><div class="n">${r.fiber}g</div><div class="l">Fiber</div></div>
          <div class="macro-cell"><div class="n">${r.sodium}mg</div><div class="l">Sodium max</div></div>
          <div class="macro-cell"><div class="n">${r.addedSugar}g</div><div class="l">Added sugar max</div></div>
        </div>
        <div class="macro-strip">
          <div class="macro-cell"><div class="n">${r.satFat}g</div><div class="l">Sat fat max</div></div>
          <div class="macro-cell"><div class="n">${r.cholesterol}mg</div><div class="l">Cholesterol max</div></div>
          <div class="macro-cell"><div class="n">${r.waterOz}oz</div><div class="l">Water</div></div>
        </div>
        <div class="hint" style="margin-top:12px;">Saved automatically as your targets — including vitamins/minerals scaled to your gender and age.</div>
      </div>
    `));
    state.goals.calories = r.calories;
    state.goals.protein = r.protein;
    state.goals.carbs = r.carbs;
    state.goals.fat = r.fat;
    state.goals.fiber = r.fiber;
    state.goals.sugar_limit = r.addedSugar;
    state.goals.added_sugar_limit = r.addedSugar;
    state.goals.sodium_limit = r.sodium;
    state.goals.sat_fat_limit = r.satFat;
    state.goals.trans_fat_limit = r.transFat;
    state.goals.cholesterol_limit = r.cholesterol;
    state.goals.water_oz = r.waterOz;
    state.goals.micros = { ...state.goals.micros, ...micros };
    state.goals.profile = { gender, age, heightIn, weightLb, activity, goal, rateLbWk };
    await saveGoalsRemote();
    await pushToLeaderboard();
    if(showToast) toast('Targets updated — water, macros, and micros all recalculated');
  };
  // Live recalculation: any change to the calculator instantly recomputes and saves every
  // dependent goal (water included), matching "update automatically" rather than requiring a click.
  ['#c-gender','#c-age','#c-height','#c-weight','#c-activity','#c-goal','#c-rate'].forEach(sel=>{
    const input = card.querySelector(sel);
    input.addEventListener('input', ()=>applyLive(false));
    input.addEventListener('change', ()=>applyLive(false));
  });
  card.querySelector('#c-calc').onclick = ()=>applyLive(true);
  if(p.age && p.heightIn && p.weightLb) applyLive(false);
  return card;
}

function renderGoals(){
  const g = state.goals;
  const wrap = el(`<div></div>`);

  const isVisible = state.profile.leaderboard_visible !== false;
  const privacyCard = el(`
    <div class="card">
      <div class="card-title">Privacy</div>
      <div class="supp-row" style="border:none;">
        <div class="supp-name">Show me on the public leaderboard</div>
        <div class="check ${isVisible?'on':''}" id="lb-toggle" style="border-radius:20px;width:40px;height:22px;position:relative;flex-shrink:0;">
          <div style="position:absolute;top:2px;left:${isVisible?'20px':'2px'};width:18px;height:18px;border-radius:50%;background:${isVisible?'var(--ink)':'var(--fog-dim)'};transition:left .15s;"></div>
        </div>
      </div>
      <div class="hint">Off: your username and score disappear from the leaderboard immediately, but your own logs, goals, and streak keep tracking normally.</div>
    </div>
  `);
  privacyCard.querySelector('#lb-toggle').onclick = async ()=>{
    const next = !isVisible;
    await setLeaderboardVisible(state.session.user.id, next);
    toast(next ? "You're visible on the leaderboard again" : 'Hidden from the leaderboard');
    render();
  };
  wrap.appendChild(privacyCard);

  wrap.appendChild(renderCalculatorCard());
  const goalCard = el(`
    <div class="card">
      <div class="card-title">Daily targets</div>
      <div class="row"><div class="field"><label>Calories</label><input id="g-cal" type="number" value="${g.calories}"></div><div class="field"><label>Water (oz)</label><input id="g-water" type="number" value="${g.water_oz}"></div></div>
      <div class="row"><div class="field"><label>Protein (g)</label><input id="g-p" type="number" value="${g.protein}"></div><div class="field"><label>Carbs (g)</label><input id="g-c" type="number" value="${g.carbs}"></div><div class="field"><label>Fat (g)</label><input id="g-f" type="number" value="${g.fat}"></div></div>
      <div class="row"><div class="field"><label>Fiber (g)</label><input id="g-fiber" type="number" value="${g.fiber}"></div><div class="field"><label>Sugar max (g)</label><input id="g-sugar" type="number" value="${g.sugar_limit}"></div><div class="field"><label>Sodium max (mg)</label><input id="g-sodium" type="number" value="${g.sodium_limit}"></div></div>
      <div class="row"><div class="field"><label>Sat fat max (g)</label><input id="g-satfat" type="number" value="${g.sat_fat_limit}"></div><div class="field"><label>Trans fat max (g)</label><input id="g-transfat" type="number" value="${g.trans_fat_limit}"></div></div>
      <div class="row"><div class="field"><label>Added sugar max (g)</label><input id="g-addedsugar" type="number" value="${g.added_sugar_limit}"></div><div class="field"><label>Cholesterol max (mg)</label><input id="g-chol" type="number" value="${g.cholesterol_limit}"></div></div>
      <button class="btn full" id="save-goals">Save targets</button>
    </div>
  `);
  goalCard.querySelector('#save-goals').onclick = async ()=>{
    g.calories=parseFloat(goalCard.querySelector('#g-cal').value)||g.calories;
    g.water_oz=parseFloat(goalCard.querySelector('#g-water').value)||g.water_oz;
    g.protein=parseFloat(goalCard.querySelector('#g-p').value)||g.protein;
    g.carbs=parseFloat(goalCard.querySelector('#g-c').value)||g.carbs;
    g.fat=parseFloat(goalCard.querySelector('#g-f').value)||g.fat;
    g.fiber=parseFloat(goalCard.querySelector('#g-fiber').value)||g.fiber;
    g.sugar_limit=parseFloat(goalCard.querySelector('#g-sugar').value)||g.sugar_limit;
    g.sodium_limit=parseFloat(goalCard.querySelector('#g-sodium').value)||g.sodium_limit;
    g.sat_fat_limit=parseFloat(goalCard.querySelector('#g-satfat').value)||g.sat_fat_limit;
    g.trans_fat_limit=parseFloat(goalCard.querySelector('#g-transfat').value)||g.trans_fat_limit;
    g.added_sugar_limit=parseFloat(goalCard.querySelector('#g-addedsugar').value)||g.added_sugar_limit;
    g.cholesterol_limit=parseFloat(goalCard.querySelector('#g-chol').value)||g.cholesterol_limit;
    await saveGoalsRemote(); await pushToLeaderboard(); toast('Targets saved'); render();
  };
  wrap.appendChild(goalCard);

  const microCard = el(`<div class="card"><div class="card-title">Micronutrient targets</div><div id="micro-edit"></div>
    <div class="add-row"><input id="new-micro-name" placeholder="Name e.g. Folate (mcg)"><input id="new-micro-target" type="number" placeholder="Target" style="max-width:100px;"><button class="btn small" id="add-micro">Add</button></div></div>`);
  const microEdit = microCard.querySelector('#micro-edit');
  Object.keys(g.micros||{}).forEach(m=>{
    const row = el(`<div class="entry"><div class="entry-name">${escapeHtml(m)}</div><div style="display:flex;align-items:center;gap:8px;"><input type="number" value="${g.micros[m]}" style="width:80px;padding:6px 8px;"><button class="del-btn">✕</button></div></div>`);
    row.querySelector('input').onchange = async (e)=>{ g.micros[m]=parseFloat(e.target.value)||0; await saveGoalsRemote(); };
    row.querySelector('.del-btn').onclick = async ()=>{ delete g.micros[m]; await saveGoalsRemote(); render(); };
    microEdit.appendChild(row);
  });
  microCard.querySelector('#add-micro').onclick = async ()=>{
    const name = microCard.querySelector('#new-micro-name').value.trim();
    const target = parseFloat(microCard.querySelector('#new-micro-target').value);
    if(!name||!target){ toast('Enter a name and target.'); return; }
    g.micros[name]=target; await saveGoalsRemote(); toast('Micro added'); render();
  };
  wrap.appendChild(microCard);

  const suppCard = el(`<div class="card"><div class="card-title">Supplement list</div><div id="supp-edit"></div>
    <div class="add-row"><input id="new-supp-name" placeholder="Name e.g. Fish oil"><input id="new-supp-dose" placeholder="Dose e.g. 1000mg" style="max-width:120px;"><button class="btn small" id="add-supp">Add</button></div></div>`);
  const suppEdit = suppCard.querySelector('#supp-edit');
  g.supplements.forEach((s,i)=>{
    const row = el(`<div class="entry"><div><div class="entry-name">${escapeHtml(s.name)}</div><div class="entry-meta">${escapeHtml(s.dose||'')}</div></div><button class="del-btn">✕</button></div>`);
    row.querySelector('.del-btn').onclick = async ()=>{ g.supplements.splice(i,1); await saveGoalsRemote(); render(); };
    suppEdit.appendChild(row);
  });
  suppCard.querySelector('#add-supp').onclick = async ()=>{
    const name = suppCard.querySelector('#new-supp-name').value.trim();
    const dose = suppCard.querySelector('#new-supp-dose').value.trim();
    if(!name){ toast('Enter a supplement name.'); return; }
    g.supplements.push({name,dose}); await saveGoalsRemote(); toast('Supplement added'); render();
  };
  wrap.appendChild(suppCard);
  return wrap;
}

/* ---------------- Init ---------------- */
async function init(){
  if(!sb){
    state.screen = 'auth';
    render();
    document.getElementById('app').insertAdjacentHTML('afterbegin', `<div style="background:var(--ember);color:#1a1200;padding:10px 16px;text-align:center;font-size:12.5px;font-weight:600;">⚠ Supabase isn't configured yet. Open SETUP.md and paste your project URL + anon key into index.html.</div>`);
    return;
  }
  const { data } = await sb.auth.getSession();
  if(data.session){ await initSession(data.session); }
  else { state.screen = 'auth'; render(); }
  sb.auth.onAuthStateChange((event, session)=>{
    if(event === 'SIGNED_OUT'){ state.session=null; state.screen='auth'; render(); }
  });
}
init();
</script>
