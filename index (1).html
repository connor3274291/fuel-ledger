<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0E1116; --panel:#171C24; --panel-2:#1E2530; --line:#2A3240;
    --fog:#8B95A5; --fog-dim:#5C6675; --paper:#EDF0F4;
    --signal:#48C7FF; --signal-dim:#1F4A5C; --ember:#FF8A4C; --mint:#5FE3A6;
    --violet:#B18BFF; --danger:#FF6B6B; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--ink);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:0 0 100px;min-height:100vh;}
  .topbar{padding:22px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,17,22,0.92);backdrop-filter:blur(8px);z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--signal),var(--mint));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:15px;}
  .brand-name{font-weight:700;font-size:17px;}
  .brand-sub{font-size:10.5px;color:var(--fog-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
  .date-pill{font-size:12px;color:var(--fog);background:var(--panel);border:1px solid var(--line);padding:6px 10px;border-radius:20px;}
  .who-banner{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:14px 18px 0;font-size:12px;}
  .who-banner .who-name{color:var(--paper);font-weight:700;}
  .who-banner button{background:none;border:none;color:var(--fog-dim);font-size:11.5px;cursor:pointer;text-decoration:underline;}
  .who-banner button:hover{color:var(--danger);}
  .nav{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto;}
  .nav button{background:transparent;border:1px solid var(--line);color:var(--fog);padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .nav button.active{background:var(--paper);color:var(--ink);border-color:var(--paper);}
  .view{padding:16px 18px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-title{font-weight:700;font-size:15px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
  .card-title .tag{font-size:10.5px;color:var(--fog-dim);font-weight:400;}
  textarea,input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--paper);border-radius:10px;padding:11px 12px;font-size:14px;resize:none;outline:none;}
  textarea:focus,input:focus,select:focus{border-color:var(--signal);}
  label{font-size:11.5px;color:var(--fog);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:6px;font-weight:600;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .btn{font-weight:700;font-size:14px;background:var(--signal);color:var(--ink);border:none;border-radius:10px;padding:12px 16px;cursor:pointer;}
  .btn:hover{opacity:0.92;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn.small{padding:7px 12px;font-size:12.5px;border-radius:8px;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:0.5;cursor:default;}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .entry:last-child{border-bottom:none;}
  .entry-name{font-size:13.5px;font-weight:600;}
  .entry-meta{font-size:11px;color:var(--fog);margin-top:2px;}
  .entry-cals{font-size:13px;color:var(--signal);font-weight:700;}
  .del-btn{background:none;border:none;color:var(--fog-dim);cursor:pointer;font-size:15px;padding:0 0 0 10px;}
  .del-btn:hover{color:var(--danger);}
  .empty{color:var(--fog-dim);font-size:13px;text-align:center;padding:20px 0;}
  .water-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .water-chip{background:var(--panel-2);border:1px solid var(--line);color:var(--paper);padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;}
  .water-chip:hover{border-color:var(--signal);color:var(--signal);}
  .supp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .supp-row:last-child{border-bottom:none;}
  .check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--fog-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;}
  .check.on{background:var(--mint);border-color:var(--mint);color:var(--ink);}
  .supp-name{font-size:13.5px;font-weight:600;flex:1;}
  .supp-dose{font-size:11.5px;color:var(--fog);}
  .ring-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;}
  .ring-card{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;width:104px;text-align:center;}
  .ring{width:64px;height:64px;border-radius:50%;margin:0 auto 8px;position:relative;display:flex;align-items:center;justify-content:center;}
  .ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring-color) calc(var(--pct)*1%), var(--panel-2) 0);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));}
  .ring-val{font-size:12px;font-weight:700;position:relative;z-index:2;}
  .ring-label{font-size:10.5px;color:var(--fog);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .ring-sub{font-size:10px;color:var(--fog-dim);margin-top:1px;}
  .result-box{background:var(--panel-2);border:1px solid var(--signal-dim);border-radius:12px;padding:16px;margin-top:14px;}
  .result-headline{font-size:28px;font-weight:700;color:var(--signal);line-height:1;}
  .result-sub{font-size:12.5px;color:var(--fog);margin-top:4px;}
  .macro-strip{display:flex;gap:14px;margin-top:14px;}
  .macro-cell{flex:1;text-align:center;}
  .macro-cell .n{font-size:16px;font-weight:700;}
  .macro-cell .l{font-size:10px;color:var(--fog-dim);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{font-size:13px;color:var(--fog-dim);width:22px;}
  .lb-rank.gold{color:#FFD166;} .lb-rank.silver{color:#C9CFDA;} .lb-rank.bronze{color:#D89B6C;}
  .lb-name{flex:1;font-size:13.5px;font-weight:600;}
  .lb-name.me{color:var(--signal);}
  .lb-score{font-size:15px;font-weight:700;color:var(--mint);}
  .hint{font-size:11.5px;color:var(--fog-dim);margin-top:8px;line-height:1.5;}
  .add-row{display:flex;gap:8px;margin-top:10px;}
  .add-row input{flex:1;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--paper);color:var(--ink);padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
  .toast.show{opacity:1;}
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{max-width:380px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 24px;}
  .auth-mark{width:52px;height:52px;border-radius:14px;margin:0 auto 16px;background:linear-gradient(135deg,var(--signal),var(--mint));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:22px;}
  .auth-title{font-weight:700;font-size:19px;margin-bottom:6px;text-align:center;}
  .auth-sub{font-size:13px;color:var(--fog);line-height:1.5;margin-bottom:20px;text-align:center;}
  .agree-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0;font-size:12px;color:var(--fog);}
  .agree-row input{width:auto;margin-top:2px;}
  .agree-row a{color:var(--signal);}
  .auth-toggle{text-align:center;margin-top:14px;font-size:12.5px;color:var(--fog);}
  .auth-toggle a{color:var(--signal);cursor:pointer;text-decoration:underline;}
  .auth-error{color:var(--danger);font-size:12.5px;margin-top:8px;text-align:center;}
  .disclaimer-footer{text-align:center;padding:20px 18px 0;font-size:11px;color:var(--fog-dim);line-height:1.6;}
  .disclaimer-footer a{color:var(--fog);}
  ::-webkit-scrollbar{height:0;width:6px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — paste your own Supabase project values here
   Get these from: Supabase Dashboard → Project Settings → API
   ============================================================ */
const SUPABASE_URL = "https://ylpjxopozaoukscimcuu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_zFadyxaU05CDefBzIpcg9A_7TlhYemv";

const sb = (SUPABASE_URL.startsWith("http")) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// Bump this any time terms.html or privacy.html materially change.
// Existing users are NOT re-prompted unless you add logic to check it against their stored version.
const CURRENT_TERMS_VERSION = "2026-07-07";

const DEFAULT_GOALS = {
  calories: 2400, protein: 160, carbs: 260, fat: 75, water_oz: 100,
  micros: {
    "Vitamin C (mg)": 90, "Vitamin D (mcg)": 20, "Calcium (mg)": 1300,
    "Iron (mg)": 18, "Potassium (mg)": 3400, "Magnesium (mg)": 400,
    "Zinc (mg)": 11, "Vitamin B12 (mcg)": 2.4
  },
  supplements: [{name:"Multivitamin", dose:"1 tablet"}, {name:"Vitamin D3", dose:"2000 IU"}]
};

let state = {
  screen: 'loading', // loading | auth | app
  authMode: 'signin', // signin | signup
  session: null,
  profile: null,
  goals: null,
  tab: 'log',
  today: dateKey(new Date()),
  log: null,
};

function dateKey(d){ return d.toISOString().slice(0,10); }
function todayNice(){ return new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function escapeHtml(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------------- Data layer (Supabase) ---------------- */
async function fetchProfile(userId){
  const { data } = await sb.from('profiles').select('*').eq('id', userId).maybeSingle();
  return data;
}
async function createProfile(userId, username){
  const { error } = await sb.from('profiles').insert({
    id:userId, username,
    terms_version: CURRENT_TERMS_VERSION,
    terms_accepted_at: new Date().toISOString()
  });
  if(error) throw error;
}
async function recordTermsAcceptance(userId){
  await sb.from('profiles').update({
    terms_version: CURRENT_TERMS_VERSION, terms_accepted_at: new Date().toISOString()
  }).eq('id', userId);
}
async function fetchGoals(userId){
  const { data } = await sb.from('goals').select('*').eq('user_id', userId).maybeSingle();
  if(!data){
    const g = { user_id:userId, ...DEFAULT_GOALS };
    await sb.from('goals').upsert(g);
    return g;
  }
  return data;
}
async function saveGoalsRemote(){
  const g = state.goals;
  await sb.from('goals').upsert({
    user_id: state.session.user.id, calories:g.calories, protein:g.protein, carbs:g.carbs, fat:g.fat,
    water_oz:g.water_oz, micros:g.micros, supplements:g.supplements, updated_at:new Date().toISOString()
  });
}
async function fetchDay(userId, dateStr){
  const { data } = await sb.from('logs').select('*').eq('user_id', userId).eq('log_date', dateStr).maybeSingle();
  return data || { foods:[], water_oz:0, supplements:[] };
}
async function saveDayRemote(){
  await sb.from('logs').upsert({
    user_id: state.session.user.id, log_date: state.today,
    foods: state.log.foods, water_oz: state.log.water_oz, supplements: state.log.supplements,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,log_date' });
}
function closeness(actual, target){ if(!target||target<=0) return null; const d=Math.abs(actual-target)/target*100; return Math.max(0,100-d*1.6); }
function capPct(actual, target){ if(!target||target<=0) return null; return Math.min(100,(actual/target)*100); }
function computeTotals(day){
  const t={calories:0,protein:0,carbs:0,fat:0,micros:{}};
  Object.keys(state.goals.micros||{}).forEach(m=>t.micros[m]=0);
  (day.foods||[]).forEach(f=>{
    t.calories+=f.calories||0; t.protein+=f.protein_g||0; t.carbs+=f.carbs_g||0; t.fat+=f.fat_g||0;
    if(f.micros) Object.keys(f.micros).forEach(m=>{ if(t.micros[m]!=null) t.micros[m]+=f.micros[m]||0; });
  });
  return t;
}
function computeDayScore(day){
  const g=state.goals, t=computeTotals(day), parts=[];
  const cCal=closeness(t.calories,g.calories); if(cCal!=null) parts.push(cCal);
  const macroScores=[closeness(t.protein,g.protein),closeness(t.carbs,g.carbs),closeness(t.fat,g.fat)].filter(x=>x!=null);
  if(macroScores.length) parts.push(macroScores.reduce((a,b)=>a+b,0)/macroScores.length);
  const wScore=capPct(day.water_oz||0,g.water_oz); if(wScore!=null) parts.push(wScore);
  if(g.supplements && g.supplements.length){
    const taken=(day.supplements||[]).filter(s=>s.taken).length;
    parts.push(Math.min(100,(taken/g.supplements.length)*100));
  }
  const mk=Object.keys(g.micros||{});
  if(mk.length){
    const ms=mk.map(m=>capPct(t.micros[m]||0,g.micros[m])).filter(x=>x!=null);
    if(ms.length) parts.push(ms.reduce((a,b)=>a+b,0)/ms.length);
  }
  return parts.length ? Math.round(parts.reduce((a,b)=>a+b,0)/parts.length) : 0;
}
async function pushToLeaderboard(){
  const score = computeDayScore(state.log);
  await sb.from('leaderboard').upsert({
    user_id: state.session.user.id, log_date: state.today, username: state.profile.username, score,
    updated_at: new Date().toISOString()
  }, { onConflict:'user_id,log_date' });
}

async function computeStreak(userId){
  const { data } = await sb.from('logs').select('log_date').eq('user_id', userId).order('log_date', { ascending:false }).limit(400);
  if(!data || !data.length) return 0;
  const dates = new Set(data.map(d=>d.log_date));
  let streak = 0;
  let checkDate = new Date();
  if(!dates.has(dateKey(checkDate))) checkDate.setDate(checkDate.getDate()-1); // grace: today not logged yet
  while(dates.has(dateKey(checkDate))){
    streak++;
    checkDate.setDate(checkDate.getDate()-1);
  }
  return streak;
}
// Free USDA food database search — no cost, no account required to start.
// DEMO_KEY works out of the box but is rate-limited across everyone using it.
// For a smoother experience, get your own free key (30 seconds, no card required)
// at https://fdc.nal.usda.gov/api-key-signup and paste it below.
const USDA_API_KEY = "DEMO_KEY";

async function searchFoodDB(query){
  const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${USDA_API_KEY}&query=${encodeURIComponent(query)}&pageSize=8`;
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('Search failed (rate limited? get your own free key — see comment above USDA_API_KEY)');
  const data = await resp.json();
  return (data.foods||[]).map(food=>{
    const nutrients = food.foodNutrients || [];
    const find = (needle) => { const n = nutrients.find(x=>(x.nutrientName||'').toLowerCase().includes(needle)); return n ? n.value : 0; };
    return {
      name: food.description,
      brand: food.brandOwner || food.brandName || '',
      per100g: {
        calories: find('energy'),
        protein: find('protein'),
        fat: find('total lipid'),
        carbs: find('carbohydrate')
      }
    };
  });
}

async function handleSignUp(email, password, username){
  if(!SUPABASE_URL.startsWith("http")){ toast("Supabase isn't configured yet — see SETUP.md"); return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error) throw error;
  if(data.session){
    await createProfile(data.user.id, username);
    await initSession(data.session);
  } else {
    toast("Check your email to confirm your account, then sign in.");
    state.authMode = 'signin';
    render();
  }
}
async function handleSignIn(email, password){
  if(!SUPABASE_URL.startsWith("http")){ toast("Supabase isn't configured yet — see SETUP.md"); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error) throw error;
  await initSession(data.session);
}
async function handleSignOut(){
  await sb.auth.signOut();
  state.session = null; state.profile = null; state.goals = null; state.log = null;
  state.screen = 'auth'; state.authMode = 'signin';
  render();
}
async function initSession(session){
  state.session = session;
  state.profile = await fetchProfile(session.user.id);
  state.goals = await fetchGoals(session.user.id);
  state.log = await fetchDay(session.user.id, state.today);
  if(state.profile && state.profile.terms_version !== CURRENT_TERMS_VERSION){
    state.screen = 'reconsent';
    render();
    return;
  }
  state.screen = 'app';
  render();
}

/* ---------------- Rendering: Auth screens ---------------- */
function renderAuth(){
  const wrap = el(`<div class="auth-screen"></div>`);
  const isSignup = state.authMode === 'signup';
  const card = el(`
    <div class="auth-card">
      <div class="auth-mark">FL</div>
      <div class="auth-title">${isSignup ? 'Create your account' : 'Welcome back'}</div>
      <div class="auth-sub">${isSignup ? 'Your log stays private to you — only your username and daily score show up on the leaderboard.' : 'Sign in to your private ledger.'}</div>
      ${isSignup ? `<div class="field"><label>Username (public on leaderboard)</label><input id="a-username" type="text" placeholder="e.g. connor_w"></div>` : ''}
      <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input id="a-password" type="password" placeholder="At least 6 characters"></div>
      ${isSignup ? `
      <div class="agree-row">
        <input type="checkbox" id="a-agree">
        <label style="margin:0;text-transform:none;font-weight:400;letter-spacing:normal;">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>, and understand nutrition figures are estimates, not medical advice.</label>
      </div>` : ''}
      <button class="btn full" id="a-submit">${isSignup ? 'Sign up' : 'Sign in'}</button>
      <div id="a-error" class="auth-error"></div>
      <div class="auth-toggle">
        ${isSignup ? 'Already have an account? <a id="a-toggle">Sign in</a>' : 'New here? <a id="a-toggle">Create an account</a>'}
      </div>
    </div>
  `);
  card.querySelector('#a-toggle').onclick = ()=>{ state.authMode = isSignup ? 'signin' : 'signup'; render(); };
  card.querySelector('#a-submit').onclick = async ()=>{
    const email = card.querySelector('#a-email').value.trim();
    const password = card.querySelector('#a-password').value;
    const errBox = card.querySelector('#a-error');
    errBox.textContent = '';
    if(!email || !password){ errBox.textContent = 'Enter an email and password.'; return; }
    const btn = card.querySelector('#a-submit');
    btn.disabled = true; btn.textContent = 'Working...';
    try{
      if(isSignup){
        const username = card.querySelector('#a-username').value.trim();
        const agreed = card.querySelector('#a-agree').checked;
        if(!username){ throw new Error('Choose a username.'); }
        if(!agreed){ throw new Error('You need to agree to the Terms and Privacy Policy to continue.'); }
        await handleSignUp(email, password, username);
      } else {
        await handleSignIn(email, password);
      }
    }catch(e){
      errBox.textContent = e.message || 'Something went wrong.';
      btn.disabled = false; btn.textContent = isSignup ? 'Sign up' : 'Sign in';
    }
  };
  wrap.appendChild(card);
  return wrap;
}

/* ---------------- Rendering: main app (same shape as the Claude-artifact version) ---------------- */
function renderReconsent(){
  const wrap = el(`<div class="auth-screen"></div>`);
  const card = el(`
    <div class="auth-card">
      <div class="auth-mark">FL</div>
      <div class="auth-title">Our terms have been updated</div>
      <div class="auth-sub">Please review the current <a href="terms.html" target="_blank" style="color:var(--signal);">Terms of Service</a> and <a href="privacy.html" target="_blank" style="color:var(--signal);">Privacy Policy</a> before continuing.</div>
      <div class="agree-row">
        <input type="checkbox" id="rc-agree">
        <label style="margin:0;text-transform:none;font-weight:400;letter-spacing:normal;">I agree to the updated Terms of Service and Privacy Policy.</label>
      </div>
      <button class="btn full" id="rc-submit">Continue</button>
    </div>
  `);
  card.querySelector('#rc-submit').onclick = async ()=>{
    if(!card.querySelector('#rc-agree').checked){ toast('Please check the box to continue.'); return; }
    await recordTermsAcceptance(state.session.user.id);

function ringCard(label,val,target,colorVar,sub){
  const pct = target ? Math.min(100,(val/target*100)) : 0;
  const colorValue = colorVar.startsWith('--') ? `var(${colorVar})` : colorVar;
  return `<div class="ring-card"><div class="ring" style="--pct:${pct};--ring-color:${colorValue};"><div class="ring-val">${Math.round(pct)}%</div></div><div class="ring-label">${label}</div><div class="ring-sub">${sub}</div></div>`;
}

async function loadLeaderboard(container){
  const body = container.querySelector('#lb-body');
  try{
    const { data, error } = await sb.from('leaderboard').select('*').eq('log_date', state.today).order('score', { ascending:false });
    if(error) throw error;
    if(!data || !data.length){ body.innerHTML = `<div class="empty">No scores yet today.</div>`; return; }
    body.innerHTML = '';
    data.forEach((e,i)=>{

}

function computeNutritionTargets(inputs){
  const { gender, age, heightIn, weightLb, activity, goal, rateLbWk } = inputs;
  const kg = weightLb * 0.453592;
  const cm = heightIn * 2.54;
  let bmr = gender === 'male'
    ? 10*kg + 6.25*cm - 5*age + 5
    : 10*kg + 6.25*cm - 5*age - 161;
  const activityMult = { sedentary:1.2, light:1.375, moderate:1.55, very:1.725, extreme:1.9 }[activity] || 1.2;
  const tdee = bmr * activityMult;
  const rate = rateLbWk || 0;
  const dailyAdjust = rate * 500; // ~500 kcal/day per lb/week of change, standard estimate
  let calories = tdee;
  if(goal === 'lose') calories = tdee - dailyAdjust;
  if(goal === 'gain') calories = tdee + dailyAdjust;
  calories = Math.max(1200, Math.round(calories));

  const protein = Math.round(weightLb * 0.9);
  const fat = Math.round((calories * 0.27) / 9);
  const carbsCals = Math.max(0, calories - (protein*4) - (fat*9));
  const carbs = Math.round(carbsCals / 4);
  const fiber = Math.round((calories/1000) * 14);
  const sodium = 2300;
  const addedSugar = gender === 'male' ? 36 : 25;
  const activityWaterBump = (activity==='very'||activity==='extreme') ? 16 : 0;
  const waterOz = Math.round(weightLb/2) + activityWaterBump;

  return { bmr:Math.round(bmr), tdee:Math.round(tdee), calories, protein, fat, carbs, fiber, sodium, addedSugar, waterOz };
}

      <div class="row"><div class="field"><label>Calories</label><input id="g-cal" type="number" value="${g.calories}"></div><div class="field"><label>Water (oz)</label><input id="g-water" type="number" value="${g.water_oz}"></div></div>
      <div class="row"><div class="field"><label>Protein (g)</label><input id="g-p" type="number" value="${g.protein}"></div><div class="field"><label>Carbs (g)</label><input id="g-c" type="number" value="${g.carbs}"></div><div class="field"><label>Fat (g)</label><input id="g-f" type="number" value="${g.fat}"></div></div>
      <button class="btn full" id="save-goals">Save targets</button>
    </div>
  `);
  goalCard.querySelector('#save-goals').onclick = async ()=>{
    g.calories=parseFloat(goalCard.querySelector('#g-cal').value)||g.calories;
    g.water_oz=parseFloat(goalCard.querySelector('#g-water').value)||g.water_oz;
    g.protein=parseFloat(goalCard.querySelector('#g-p').value)||g.protein;
    g.carbs=parseFloat(goalCard.querySelector('#g-c').value)||g.carbs;
    g.fat=parseFloat(goalCard.querySelector('#g-f').value)||g.fat;
    await saveGoalsRemote(); await pushToLeaderboard(); toast('Targets saved'); render();
  };
  wrap.appendChild(goalCard);

  const microCard = el(`<div class="card"><div class="card-title">Micronutrient targets</div><div id="micro-edit"></div>
    <div class="add-row"><input id="new-micro-name" placeholder="Name e.g. Folate (mcg)"><input id="new-micro-target" type="number" placeholder="Target" style="max-width:100px;"><button class="btn small" id="add-micro">Add</button></div></div>`);
  const microEdit = microCard.querySelector('#micro-edit');
  Object.keys(g.micros||{}).forEach(m=>{
    const row = el(`<div class="entry"><div class="entry-name">${escapeHtml(m)}</div><div style="display:flex;align-items:center;gap:8px;"><input type="number" value="${g.micros[m]}" style="width:80px;padding:6px 8px;"><button class="del-btn">✕</button></div></div>`);
    row.querySelector('input').onchange = async (e)=>{ g.micros[m]=parseFloat(e.target.value)||0; await saveGoalsRemote(); };
    row.querySelector('.del-btn').onclick = async ()=>{ delete g.micros[m]; await saveGoalsRemote(); render(); };
    microEdit.appendChild(row);
  });
  microCard.querySelector('#add-micro').onclick = async ()=>{
    const name = microCard.querySelector('#new-micro-name').value.trim();
    const target = parseFloat(microCard.querySelector('#new-micro-target').value);
    if(!name||!target){ toast('Enter a name and target.'); return; }
    g.micros[name]=target; await saveGoalsRemote(); toast('Micro added'); render();
  };
  wrap.appendChild(microCard);

  const suppCard = el(`<div class="card"><div class="card-title">Supplement list</div><div id="supp-edit"></div>
    <div class="add-row"><input id="new-supp-name" placeholder="Name e.g. Fish oil"><input id="new-supp-dose" placeholder="Dose e.g. 1000mg" style="max-width:120px;"><button class="btn small" id="add-supp">Add</button></div></div>`);
  const suppEdit = suppCard.querySelector('#supp-edit');
  g.supplements.forEach((s,i)=>{
    const row = el(`<div class="entry"><div><div class="entry-name">${escapeHtml(s.name)}</div><div class="entry-meta">${escapeHtml(s.dose||'')}</div></div><button class="del-btn">✕</button></div>`);
    row.querySelector('.del-btn').onclick = async ()=>{ g.supplements.splice(i,1); await saveGoalsRemote(); render(); };
    suppEdit.appendChild(row);
  });
  suppCard.querySelector('#add-supp').onclick = async ()=>{
    const name = suppCard.querySelector('#new-supp-name').value.trim();
    const dose = suppCard.querySelector('#new-supp-dose').value.trim();
    if(!name){ toast('Enter a supplement name.'); return; }
    g.supplements.push({name,dose}); await saveGoalsRemote(); toast('Supplement added'); render();
  };
  wrap.appendChild(suppCard);
  return wrap;
}

/* ---------------- Init ---------------- */
async function init(){
  if(!sb){
    state.screen = 'auth';
    render();
    document.getElementById('app').insertAdjacentHTML('afterbegin', `<div style="background:var(--ember);color:#1a1200;padding:10px 16px;text-align:center;font-size:12.5px;font-weight:600;">⚠ Supabase isn't configured yet. Open SETUP.md and paste your project URL + anon key into index.html.</div>`);
    return;
  }
  const { data } = await sb.auth.getSession();
  if(data.session){ await initSession(data.session); }
  else { state.screen = 'auth'; render(); }
  sb.auth.onAuthStateChange((event, session)=>{
    if(event === 'SIGNED_OUT'){ state.session=null; state.screen='auth'; render(); }
  });
}
init();
</script>
</body>
</html>
